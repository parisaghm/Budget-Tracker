<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 48 48"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Budget Tracker</title>
  <desc id="desc">Minimal wallet and coin icon for budgeting</desc>

  <!-- Outer transparent rounded square, sized to look balanced inside the purple container -->
  <rect
    x="6"
    y="6"
    width="36"
    height="36"
    rx="11"
    fill="none"
  />

  <!-- Coin -->
  <circle
    cx="31.5"
    cy="15"
    r="5.2"
    fill="none"
    stroke="#f9fafb"
    stroke-width="1.7"
  />
  <path
    d="M31.5 12.2v5.6M29.2 14.5h4.6"
    stroke="#f9fafb"
    stroke-width="1.6"
    stroke-linecap="round"
  />

  <!-- Wallet body -->
  <rect
    x="11"
    y="19"
    width="22"
    height="13.5"
    rx="4"
    fill="none"
    stroke="#f9fafb"
    stroke-width="1.8"
  />
  <rect
    x="13.5"
    y="21.3"
    width="16.5"
    height="8.1"
    rx="2.4"
    fill="none"
    stroke="#f9fafb"
    stroke-width="1.4"
  />

  <!-- Wallet clasp -->
  <circle
    cx="27.3"
    cy="25.4"
    r="1.4"
    fill="#f9fafb"
  />

  <!-- Baseline to suggest money flow -->
  <path
    d="M13.3 32.3h14.2"
    stroke="#f9fafb"
    stroke-width="1.6"
    stroke-linecap="round"
  />
</svg>

