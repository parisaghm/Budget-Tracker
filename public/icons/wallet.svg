<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Background circle for better visibility as a favicon -->
  <circle cx="12" cy="12" r="10" fill="#0F172A" />

  <!-- Wallet body -->
  <rect
    x="5"
    y="8"
    width="14"
    height="9"
    rx="2"
    ry="2"
    fill="url(#walletGradient)"
  />

  <!-- Wallet flap -->
  <path
    d="M6.5 9.5C6.5 8.95 6.95 8.5 7.5 8.5H15.5C16.33 8.5 17 7.83 17 7V6.75C17 6.34 16.66 6 16.25 6H8.25C6.45 6 5 7.45 5 9.25V10H6.5V9.5Z"
    fill="#020617"
    opacity="0.9"
  />

  <!-- Side pocket / clasp -->
  <rect
    x="15"
    y="10"
    width="4"
    height="5"
    rx="1"
    ry="1"
    fill="#020617"
    opacity="0.95"
  />
  <circle cx="16.75" cy="12.5" r="0.7" fill="#E5E7EB" />

  <!-- Wallet outline -->
  <rect
    x="5"
    y="8"
    width="14"
    height="9"
    rx="2"
    ry="2"
    stroke="#020617"
    stroke-width="1.1"
    fill="none"
  />

  <defs>
    <linearGradient id="walletGradient" x1="5" y1="8" x2="19" y2="17" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22C55E" />
      <stop offset="1" stop-color="#16A34A" />
    </linearGradient>
  </defs>
</svg>
